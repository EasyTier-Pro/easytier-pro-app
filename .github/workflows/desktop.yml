name: Desktop Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  INSTALLER_REPOSITORY: EasyTier-Pro/installer
  INSTALLER_REF: main
  APPCAST_GITEE_BASE_URL: https://gitee.com/EasyTier-Pro/easytier-pro-app/releases/download/latest
  APPCAST_OSS_BASE_URL: https://easytier.net/releases
  APPCAST_GITHUB_BASE_URL: https://github.com/EasyTier-Pro/easytier-pro-app/releases/latest/download

jobs:
  windows:
    name: Windows release package
    runs-on: windows-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve installer commit
        id: installer
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git ls-remote "https://github.com/${INSTALLER_REPOSITORY}.git" "refs/heads/${INSTALLER_REF}" | awk '{print $1}')"
          if [ -z "$sha" ]; then
            echo "Failed to resolve ${INSTALLER_REPOSITORY} ${INSTALLER_REF}" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved installer ${INSTALLER_REF}: $sha"

      - name: Checkout installer
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INSTALLER_REPOSITORY }}
          ref: ${{ steps.installer.outputs.sha }}
          path: .installer-src
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Rust for installer
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Resolve installer dependency lock
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .installer-src/Cargo.lock ]; then
            cargo fetch --manifest-path .installer-src/Cargo.toml --locked
          else
            cargo generate-lockfile --manifest-path .installer-src/Cargo.toml
          fi

      - name: Restore installer binary cache
        id: installer-cache
        uses: actions/cache/restore@v5
        with:
          path: .installer-cache/x86_64-pc-windows-msvc
          key: easytier-pro-installer-bin-${{ runner.os }}-x86_64-pc-windows-msvc-${{ steps.installer.outputs.sha }}-${{ hashFiles('.installer-src/Cargo.lock') }}

      - name: Build installer
        if: steps.installer-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cargo build --locked --manifest-path .installer-src/Cargo.toml --release --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force .installer-cache/x86_64-pc-windows-msvc | Out-Null
          Copy-Item `
            .installer-src/target/x86_64-pc-windows-msvc/release/easytier-pro-installer.exe `
            .installer-cache/x86_64-pc-windows-msvc/easytier-pro-installer.exe `
            -Force

      - name: Save installer binary cache
        if: steps.installer-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .installer-cache/x86_64-pc-windows-msvc
          key: ${{ steps.installer-cache.outputs.cache-primary-key }}

      - name: Stage bundled installer
        shell: pwsh
        run: |
          Copy-Item `
            .installer-cache/x86_64-pc-windows-msvc/easytier-pro-installer.exe `
            windows/runner/resources/easytier-pro-installer.exe `
            -Force

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Package Windows installer
        shell: pwsh
        run: ./scripts/package_windows_installer.ps1

      - name: Sign Windows installer for appcast
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          WINDOWS_UPDATE_DSA_PRIVATE_KEY: ${{ secrets.WINDOWS_UPDATE_DSA_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_UPDATE_DSA_PRIVATE_KEY)) {
            throw "Missing WINDOWS_UPDATE_DSA_PRIVATE_KEY secret for appcast signing."
          }

          $installer = Get-ChildItem dist -Filter "easytier-pro-windows-x64-setup-*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Windows installer was not found in dist."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "dsa_priv.pem"
          try {
            [System.IO.File]::WriteAllText(
              $keyPath,
              $env:WINDOWS_UPDATE_DSA_PRIVATE_KEY,
              [System.Text.UTF8Encoding]::new($false)
            )

            $signature = (& dart run auto_updater:sign_update $installer.FullName $keyPath) -join "`n"
            if ($LASTEXITCODE -ne 0) {
              throw "Windows appcast signing failed."
            }
            $signaturePath = "dist/easytier-pro-windows-x64.appcast-signature.txt"
            [System.IO.File]::WriteAllText(
              $signaturePath,
              $signature + [Environment]::NewLine,
              [System.Text.UTF8Encoding]::new($false)
            )

            dart scripts/generate_appcast.dart metadata `
              --platform windows `
              --arch x64 `
              --artifact $installer.FullName `
              --signature-file $signaturePath `
              --output dist/easytier-pro-windows-x64.appcast.json
          } finally {
            Remove-Item $keyPath -Force -ErrorAction SilentlyContinue
          }

      - name: Package Windows portable archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath dist\easytier-pro-windows-x64.zip `
            -Force

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: easytier-pro-windows-x64-installer
          path: dist/easytier-pro-windows-x64-setup-*.exe
          if-no-files-found: error

      - name: Upload Windows appcast metadata
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: _easytier-pro-windows-x64-appcast-metadata
          path: |
            dist/easytier-pro-windows-x64.appcast.json
            dist/easytier-pro-windows-x64.appcast-signature.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload Windows portable archive
        uses: actions/upload-artifact@v4
        with:
          name: easytier-pro-windows-x64
          path: dist/easytier-pro-windows-x64.zip
          if-no-files-found: error

  macos:
    name: macOS release package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            installer_target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: x64
            installer_target: x86_64-apple-darwin

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve installer commit
        id: installer
        run: |
          set -euo pipefail
          sha="$(git ls-remote "https://github.com/${INSTALLER_REPOSITORY}.git" "refs/heads/${INSTALLER_REF}" | awk '{print $1}')"
          if [ -z "$sha" ]; then
            echo "Failed to resolve ${INSTALLER_REPOSITORY} ${INSTALLER_REF}" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved installer ${INSTALLER_REF}: $sha"

      - name: Checkout installer
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INSTALLER_REPOSITORY }}
          ref: ${{ steps.installer.outputs.sha }}
          path: .installer-src
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Rust for installer
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.installer_target }}

      - name: Resolve installer dependency lock
        run: |
          set -euo pipefail
          if [ -f .installer-src/Cargo.lock ]; then
            cargo fetch --manifest-path .installer-src/Cargo.toml --locked
          else
            cargo generate-lockfile --manifest-path .installer-src/Cargo.toml
          fi

      - name: Restore installer binary cache
        id: installer-cache
        uses: actions/cache/restore@v5
        with:
          path: .installer-cache/${{ matrix.installer_target }}
          key: easytier-pro-installer-bin-${{ runner.os }}-${{ matrix.installer_target }}-${{ steps.installer.outputs.sha }}-${{ hashFiles('.installer-src/Cargo.lock') }}

      - name: Build installer
        if: steps.installer-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cargo build --locked --manifest-path .installer-src/Cargo.toml --release --target "${{ matrix.installer_target }}"
          mkdir -p ".installer-cache/${{ matrix.installer_target }}"
          cp \
            ".installer-src/target/${{ matrix.installer_target }}/release/easytier-pro-installer" \
            ".installer-cache/${{ matrix.installer_target }}/easytier-pro-installer"
          chmod +x ".installer-cache/${{ matrix.installer_target }}/easytier-pro-installer"

      - name: Save installer binary cache
        if: steps.installer-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .installer-cache/${{ matrix.installer_target }}
          key: ${{ steps.installer-cache.outputs.cache-primary-key }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build macOS release
        env:
          EASYTIER_BUNDLED_INSTALLER: ${{ github.workspace }}/.installer-cache/${{ matrix.installer_target }}/easytier-pro-installer
        run: flutter build macos --release

      - name: Package macOS DMG
        run: |
          bash scripts/package_macos_dmg.sh \
            "build/macos/Build/Products/Release/EasyTier Pro.app" \
            "dist/easytier-pro-macos-${{ matrix.arch }}.dmg"

      - name: Package macOS zip
        run: |
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/EasyTier Pro.app" \
            "dist/easytier-pro-macos-${{ matrix.arch }}.zip"

      - name: Sign macOS zip for appcast
        if: github.event_name != 'pull_request'
        env:
          MACOS_UPDATE_SPARKLE_PRIVATE_KEY: ${{ secrets.MACOS_UPDATE_SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_UPDATE_SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "Missing MACOS_UPDATE_SPARKLE_PRIVATE_KEY secret for appcast signing." >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/sparkle_private_key"
          cleanup() {
            rm -f "$key_path"
          }
          trap cleanup EXIT

          printf '%s' "$MACOS_UPDATE_SPARKLE_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

          signature_path="dist/easytier-pro-macos-${{ matrix.arch }}.appcast-signature.txt"
          dart run auto_updater:sign_update \
            --ed-key-file "$key_path" \
            "dist/easytier-pro-macos-${{ matrix.arch }}.zip" \
            > "$signature_path"

          dart scripts/generate_appcast.dart metadata \
            --platform macos \
            --arch "${{ matrix.arch }}" \
            --artifact "dist/easytier-pro-macos-${{ matrix.arch }}.zip" \
            --signature-file "$signature_path" \
            --output "dist/easytier-pro-macos-${{ matrix.arch }}.appcast.json"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: easytier-pro-macos-${{ matrix.arch }}-dmg
          path: dist/easytier-pro-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Upload macOS zip
        uses: actions/upload-artifact@v4
        with:
          name: easytier-pro-macos-${{ matrix.arch }}
          path: dist/easytier-pro-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Upload macOS appcast metadata
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: _easytier-pro-macos-${{ matrix.arch }}-appcast-metadata
          path: |
            dist/easytier-pro-macos-${{ matrix.arch }}.appcast.json
            dist/easytier-pro-macos-${{ matrix.arch }}.appcast-signature.txt
          if-no-files-found: error
          retention-days: 1

  appcast:
    name: Appcast feed XML
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download appcast metadata
        uses: actions/download-artifact@v4
        with:
          pattern: _easytier-pro-*-appcast-metadata
          path: dist/appcast-metadata
          merge-multiple: true

      - name: Generate appcast feed XML
        run: |
          set -euo pipefail
          mkdir -p dist/appcast
          dart scripts/generate_appcast.dart appcast \
            --base-url "${APPCAST_GITEE_BASE_URL}" \
            --output dist/appcast/appcast-gitee.xml \
            dist/appcast-metadata/*.json
          dart scripts/generate_appcast.dart appcast \
            --base-url "${APPCAST_OSS_BASE_URL}" \
            --output dist/appcast/appcast-oss.xml \
            dist/appcast-metadata/*.json
          dart scripts/generate_appcast.dart appcast \
            --base-url "${APPCAST_GITHUB_BASE_URL}" \
            --output dist/appcast/appcast-github.xml \
            dist/appcast-metadata/*.json
          cp dist/appcast/appcast-github.xml dist/appcast/appcast.xml

      - name: Upload appcast feed XML
        uses: actions/upload-artifact@v4
        with:
          name: easytier-pro-appcast
          path: dist/appcast/*.xml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - appcast
    permissions:
      contents: write

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate tag version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          release_version="${tag#v}"
          pubspec_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
          pubspec_short_version="${pubspec_version%%+*}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the vX.Y.Z format: $tag" >&2
            exit 1
          fi

          if [[ "$release_version" != "$pubspec_short_version" ]]; then
            echo "Tag $tag does not match pubspec.yaml version $pubspec_version." >&2
            echo "Expected tag: v$pubspec_short_version" >&2
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: easytier-pro-*
          path: dist/release-assets
          merge-multiple: true

      - name: Validate release artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob

          required_patterns=(
            "appcast.xml"
            "appcast-gitee.xml"
            "appcast-oss.xml"
            "appcast-github.xml"
            "easytier-pro-windows-x64-setup-*.exe"
            "easytier-pro-windows-x64.zip"
            "easytier-pro-macos-arm64.dmg"
            "easytier-pro-macos-arm64.zip"
            "easytier-pro-macos-x64.dmg"
            "easytier-pro-macos-x64.zip"
          )

          for pattern in "${required_patterns[@]}"; do
            matches=(dist/release-assets/$pattern)
            if [[ "${#matches[@]}" -ne 1 ]]; then
              echo "Expected exactly one release artifact matching $pattern, found ${#matches[@]}." >&2
              find dist/release-assets -maxdepth 1 -type f -print | sort >&2
              exit 1
            fi
          done

          if find dist/release-assets -maxdepth 1 -type f \( -name "*.json" -o -name "*.txt" \) | grep -q .; then
            echo "Internal appcast metadata files must not be attached to the release." >&2
            find dist/release-assets -maxdepth 1 -type f \( -name "*.json" -o -name "*.txt" \) -print >&2
            exit 1
          fi

          find dist/release-assets -maxdepth 1 -type f -print | sort

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="EasyTier Pro $tag"
          mapfile -t assets < <(find dist/release-assets -maxdepth 1 -type f -print | sort)

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists. Delete the existing draft before rerunning this workflow." >&2
            exit 1
          fi

          gh release create "$tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --title "$title" \
            --generate-notes
