name: Android

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  EASYTIER_COMMIT: c0f42ebe8c0b18e49370ae810b13fba1bdbbb811
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  android-jni:
    name: Android JNI and debug build
    runs-on: windows-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout EasyTier core
        uses: actions/checkout@v4
        with:
          repository: EasyTier/EasyTier
          ref: ${{ env.EASYTIER_COMMIT }}
          path: EasyTier
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: pwsh
        run: sdkmanager "ndk;$env:ANDROID_NDK_VERSION"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart sources
        run: dart analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build EasyTier Android JNI
        shell: pwsh
        run: >
          ./scripts/build_android_jni.ps1
          -EasyTierRoot ./EasyTier
          -EasyTierCommit $env:EASYTIER_COMMIT
          -AndroidSdk $env:ANDROID_HOME
          -NdkVersion $env:ANDROID_NDK_VERSION

      - name: Verify Android release inputs
        shell: pwsh
        run: ./scripts/verify_android_release_inputs.ps1

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Build Android instrumented test APK
        shell: pwsh
        working-directory: android
        run: ./gradlew.bat :app:assembleDebugAndroidTest
