org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Required by Flutter's AGP 9 migrator until Flutter can use the new AGP DSL
# here without hitting its legacy extension path during plugin application.
android.newDsl=false
android.builtInKotlin=false
# Kotlin incremental cache can fail on Windows when pub cache and project
# sources live on different drives.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
